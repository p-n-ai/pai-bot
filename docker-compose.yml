services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pai}
      POSTGRES_DB: pai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pai"]
      interval: 5s
      timeout: 3s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    ports:
      - "6379:6379"
    volumes:
      - dragonfly-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  goose:
    image: golang:1.25
    profiles:
      - tools
    working_dir: /app
    volumes:
      - ./:/app
      - goose-gomod:/go/pkg/mod
      - goose-gocache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      LEARN_SERVER_HOST: 0.0.0.0
      LEARN_SERVER_PORT: 8080
      LEARN_DATABASE_URL: postgres://pai:${POSTGRES_PASSWORD:-pai}@postgres:5432/pai?sslmode=disable
      LEARN_CACHE_URL: redis://dragonfly:6379
      LEARN_AI_OLLAMA_URL: http://ollama:11434
      LEARN_WHATSAPP_MEOW_DB: "file:/data/whatsmeow.db?_pragma=foreign_keys(1)&_pragma=journal_mode(WAL)&_pragma=busy_timeout(5000)"
    volumes:
      - whatsmeow-data:/data
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.admin
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
      admin:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama

volumes:
  postgres-data:
  dragonfly-data:
  whatsmeow-data:
  caddy_data:
  caddy_config:
  ollama-data:
  goose-gomod:
  goose-gocache:
