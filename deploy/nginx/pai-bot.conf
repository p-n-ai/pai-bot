# Nginx reverse proxy for P&AI Bot
# Install: sudo cp deploy/nginx/pai-bot.conf /etc/nginx/sites-available/pai-bot
#          sudo ln -s /etc/nginx/sites-available/pai-bot /etc/nginx/sites-enabled/
#          sudo rm /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
#
# For SSL with Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com

upstream app {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name _;

    # Health check endpoint (no proxy buffering)
    location /healthz {
        proxy_pass http://app;
        proxy_set_header Host $host;
        access_log off;
    }

    location /readyz {
        proxy_pass http://app;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
