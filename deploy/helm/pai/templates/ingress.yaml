# SPDX-License-Identifier: Apache-2.0
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pai.fullname" . }}
  labels:
    {{- include "pai.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    # WebSocket support for /ws/chat
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # API and health endpoints -> app
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "pai.fullname" . }}-app
                port:
                  name: http
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ include "pai.fullname" . }}-app
                port:
                  name: http
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: {{ include "pai.fullname" . }}-app
                port:
                  name: http
          # WebSocket endpoint -> app
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "pai.fullname" . }}-app
                port:
                  name: http
          # Webhook endpoints -> app
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: {{ include "pai.fullname" . }}-app
                port:
                  name: http
          # OpenAPI docs -> app
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: {{ include "pai.fullname" . }}-app
                port:
                  name: http
          - path: /docs
            pathType: Exact
            backend:
              service:
                name: {{ include "pai.fullname" . }}-app
                port:
                  name: http
          {{- if .Values.admin.enabled }}
          # Everything else -> admin
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "pai.fullname" . }}-admin
                port:
                  name: http
          {{- end }}
{{- end }}
