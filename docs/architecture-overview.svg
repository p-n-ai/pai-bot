  <text x="314" y="316" text-anchor="middle" font-size="7.5" fill="#64748b">Static + Dynamic Gen</text>

  <rect x="386" y="286" width="120" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="446" y="304" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Compaction</text>
