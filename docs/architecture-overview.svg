  <text x="530" y="850" text-anchor="middle" font-size="8" fill="#94a3b8">TDD enforced: make test-all must pass · JWT (15min) · RBAC · tenant isolation · TLS · COPPA/PDPA · &lt;25MB image · &lt;100ms cold start</text>

