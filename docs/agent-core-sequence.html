  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

  width: 100%;
}

}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;section id=&quot;agent-core-sequence-switch&quot; aria-label=&quot;Agent core sequence before and after&quot;&gt;
  &lt;style&gt;
    #agent-core-sequence-switch {
      color: var(--foreground);
      font-family: system-ui, sans-serif;
      font-size: var(--font-size-base);
      font-synthesis: none;
      overflow-wrap: break-word;
    }

    #agent-core-sequence-switch * { box-sizing: border-box; }

    #agent-core-sequence-switch .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-block-end: 0.75rem;
    }

    #agent-core-sequence-switch .switch {
      display: flex;
      gap: 0.4rem;
    }

    #agent-core-sequence-switch .summary {
      color: var(--muted-foreground);
      text-align: end;
    }

    #agent-core-sequence-switch .desktop-diagram {
      display: block;
      inline-size: 100%;
      block-size: auto;
      color: var(--foreground);
    }

    #agent-core-sequence-switch .lifeline {
      stroke: var(--border);
      stroke-width: 1;
    }

    #agent-core-sequence-switch .participant {
      fill: var(--card);
      stroke: var(--border);
      stroke-width: 1;
    }

    #agent-core-sequence-switch .participant-label,
    #agent-core-sequence-switch .event-label {
      fill: var(--foreground);
      font-family: system-ui, sans-serif;
      font-weight: 500;
    }

    #agent-core-sequence-switch .event-label {
      font-weight: 400;
    }

    #agent-core-sequence-switch .arrow {
      stroke: var(--primary);
      stroke-width: 2;
    }

    #agent-core-sequence-switch .self-arrow {
      fill: none;
      stroke: var(--primary);
      stroke-width: 2;
    }

    #agent-core-sequence-switch .mobile-sequence {
      display: none;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    #agent-core-sequence-switch .mobile-sequence li {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.55rem;
      padding-block: 0.55rem;
      border-block-end: 1px solid var(--border);
    }

    #agent-core-sequence-switch .event-number {
      color: var(--muted-foreground);
      font-variant-numeric: tabular-nums;
    }

    #agent-core-sequence-switch .mobile-sequence strong {
      display: block;
      font-weight: 500;
    }

    #agent-core-sequence-switch .mobile-sequence span:last-child {
      color: var(--muted-foreground);
    }

    @media (max-width: 560px) {
      #agent-core-sequence-switch .desktop-diagram { display: none; }
      #agent-core-sequence-switch .mobile-sequence { display: block; }
      #agent-core-sequence-switch .controls {
        align-items: stretch;
        flex-direction: column;
      }
      #agent-core-sequence-switch .summary { text-align: start; }
    }
  &lt;/style&gt;

  &lt;div class=&quot;controls&quot;&gt;
    &lt;div class=&quot;switch&quot; role=&quot;group&quot; aria-label=&quot;Sequence version&quot;&gt;
      &lt;button class=&quot;btn&quot; type=&quot;button&quot; id=&quot;before&quot; aria-pressed=&quot;true&quot;&gt;Before&lt;/button&gt;
      &lt;button class=&quot;btn&quot; type=&quot;button&quot; id=&quot;after&quot; aria-pressed=&quot;false&quot;&gt;After&lt;/button&gt;
    &lt;/div&gt;
    &lt;span class=&quot;summary&quot; id=&quot;summary&quot; aria-live=&quot;polite&quot;&gt;&lt;/span&gt;
  &lt;/div&gt;

  &lt;svg class=&quot;desktop-diagram&quot; id=&quot;diagram&quot; viewBox=&quot;0 0 900 610&quot; role=&quot;img&quot; aria-labelledby=&quot;diagram-description&quot;&gt;
    &lt;title id=&quot;diagram-description&quot;&gt;&lt;/title&gt;
    &lt;defs&gt;
      &lt;marker id=&quot;sequence-arrow&quot; markerWidth=&quot;8&quot; markerHeight=&quot;8&quot; refX=&quot;7&quot; refY=&quot;4&quot; orient=&quot;auto&quot; markerUnits=&quot;strokeWidth&quot;&gt;
        &lt;path d=&quot;M 0 0 L 8 4 L 0 8 z&quot; fill=&quot;var(--primary)&quot;&gt;&lt;/path&gt;
      &lt;/marker&gt;
    &lt;/defs&gt;
    &lt;g id=&quot;diagram-content&quot;&gt;&lt;/g&gt;
  &lt;/svg&gt;

  &lt;ol class=&quot;mobile-sequence&quot; id=&quot;mobile-sequence&quot;&gt;&lt;/ol&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;agent-core-sequence-switch&#x27;);
      if (!root) return;

      const states = {
        before: {
          summary: &#x27;One model call; native tool structure is flattened to text&#x27;,
          participants: [&#x27;Learner&#x27;, &#x27;Telegram&#x27;, &#x27;Tutor&#x27;, &#x27;AI router&#x27;, &#x27;LLM&#x27;, &#x27;Store&#x27;],
          events: [
            [0, 1, &#x27;Send message&#x27;],
            [1, 2, &#x27;InboundMessage&#x27;],
            [2, 5, &#x27;Persist learner text&#x27;],
            [2, 2, &#x27;Load history + curriculum eagerly&#x27;],
            [2, 3, &#x27;Complete(text messages)&#x27;],
            [3, 4, &#x27;Single provider call&#x27;],
            [4, 3, &#x27;Native assistant response&#x27;],
            [3, 2, &#x27;Flatten to final text&#x27;],
            [2, 2, &#x27;Clean tutor response&#x27;],
            [2, 5, &#x27;Persist final text&#x27;],
            [2, 1, &#x27;OutboundMessage&#x27;],
            [1, 0, &#x27;Render final answer&#x27;]
          ]
        },
        after: {
          summary: &#x27;Native model → tool → model loop; Telegram stays outside&#x27;,
          participants: [&#x27;Learner&#x27;, &#x27;Telegram&#x27;, &#x27;Tutor&#x27;, &#x27;Agent core&#x27;, &#x27;AI + LLM&#x27;, &#x27;Tool / Store&#x27;],
          events: [
            [0, 1, &#x27;Send message&#x27;],
            [1, 2, &#x27;InboundMessage&#x27;],
            [2, 2, &#x27;Serialize conversation turn&#x27;],
            [2, 5, &#x27;Persist learner text&#x27;],
            [2, 3, &#x27;Run(native context, tools)&#x27;],
            [3, 4, &#x27;Complete(native transcript)&#x27;],
            [4, 3, &#x27;Assistant tool call&#x27;],
            [3, 5, &#x27;Execute curriculum tool&#x27;],
            [5, 3, &#x27;ToolResultMessage&#x27;],
            [3, 3, &#x27;Append result; continue&#x27;],
            [3, 4, &#x27;Complete(updated transcript)&#x27;],
            [4, 3, &#x27;Final assistant; no tool calls&#x27;],
            [3, 2, &#x27;Return completed turn&#x27;],
            [2, 5, &#x27;Persist final text only&#x27;],
            [2, 1, &#x27;OutboundMessage&#x27;],
            [1, 0, &#x27;Render final answer&#x27;]
          ]
        }
      };

      const refs = {
        before: root.querySelector(&#x27;#before&#x27;),
        after: root.querySelector(&#x27;#after&#x27;),
        summary: root.querySelector(&#x27;#summary&#x27;),
        title: root.querySelector(&#x27;#diagram-description&#x27;),
        content: root.querySelector(&#x27;#diagram-content&#x27;),
        mobile: root.querySelector(&#x27;#mobile-sequence&#x27;)
      };

      const svgNS = &#x27;http://www.w3.org/2000/svg&#x27;;
      let selected = &#x27;before&#x27;;

      function svgElement(name, attributes = {}) {
        const node = document.createElementNS(svgNS, name);
        Object.entries(attributes).forEach(([key, value]) =&gt; node.setAttribute(key, value));
        return node;
      }

      function renderParticipant(label, index) {
        const x = 75 + index * 150;
        const box = svgElement(&#x27;rect&#x27;, { x: x - 58, y: 12, width: 116, height: 38, rx: 5, class: &#x27;participant&#x27; });
        const text = svgElement(&#x27;text&#x27;, { x, y: 36, &#x27;text-anchor&#x27;: &#x27;middle&#x27;, class: &#x27;participant-label&#x27; });
        text.textContent = label;
        const line = svgElement(&#x27;line&#x27;, { x1: x, x2: x, y1: 50, y2: 590, class: &#x27;lifeline&#x27; });
        refs.content.append(box, line, text);
      }

      function renderEvent(event, index) {
        const [source, target, label] = event;
        const sourceX = 75 + source * 150;
        const targetX = 75 + target * 150;
        const y = 82 + index * 31;

        if (source === target) {
          const path = svgElement(&#x27;path&#x27;, {
            d: `M ${sourceX} ${y} h 34 v 16 h -34`,
            class: &#x27;self-arrow&#x27;,
            &#x27;marker-end&#x27;: &#x27;url(#sequence-arrow)&#x27;
          });
          const text = svgElement(&#x27;text&#x27;, { x: sourceX + 39, y: y + 12, class: &#x27;event-label&#x27; });
          text.textContent = label;
          refs.content.append(path, text);
          return;
        }

        const direction = targetX &gt; sourceX ? 1 : -1;
        const line = svgElement(&#x27;line&#x27;, {
          x1: sourceX + direction * 4,
          x2: targetX - direction * 7,
          y1: y,
          y2: y,
          class: &#x27;arrow&#x27;,
          &#x27;marker-end&#x27;: &#x27;url(#sequence-arrow)&#x27;
        });
        const text = svgElement(&#x27;text&#x27;, {
          x: (sourceX + targetX) / 2,
          y: y - 6,
          &#x27;text-anchor&#x27;: &#x27;middle&#x27;,
          class: &#x27;event-label&#x27;
        });
        text.textContent = label;
        refs.content.append(line, text);
      }

      function renderMobile(events, participants) {
        const rows = events.map(([source, target, label], index) =&gt; {
          const item = document.createElement(&#x27;li&#x27;);
          const number = document.createElement(&#x27;span&#x27;);
          number.className = &#x27;event-number&#x27;;
          number.textContent = String(index + 1).padStart(2, &#x27;0&#x27;);
          const body = document.createElement(&#x27;div&#x27;);
          const route = document.createElement(&#x27;strong&#x27;);
          route.textContent = source === target
            ? participants[source]
            : `${participants[source]} → ${participants[target]}`;
          const description = document.createElement(&#x27;span&#x27;);
          description.textContent = label;
          body.append(route, description);
          item.append(number, body);
          return item;
        });
        refs.mobile.replaceChildren(...rows);
      }

      function render() {
        const state = states[selected];
        refs.before.setAttribute(&#x27;aria-pressed&#x27;, String(selected === &#x27;before&#x27;));
        refs.after.setAttribute(&#x27;aria-pressed&#x27;, String(selected === &#x27;after&#x27;));
        refs.summary.textContent = state.summary;
        refs.title.textContent = `${selected === &#x27;before&#x27; ? &#x27;Before&#x27; : &#x27;After&#x27;} agent core sequence: ${state.summary}`;
        refs.content.replaceChildren();
        state.participants.forEach(renderParticipant);
        state.events.forEach(renderEvent);
        renderMobile(state.events, state.participants);
      }

      refs.before.addEventListener(&#x27;click&#x27;, () =&gt; {
        selected = &#x27;before&#x27;;
        render();
      });

      refs.after.addEventListener(&#x27;click&#x27;, () =&gt; {
        selected = &#x27;after&#x27;;
        render();
      });

      render();
    })();
  &lt;/script&gt;
&lt;/section&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
