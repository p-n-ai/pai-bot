<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 860" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="1060" height="860" fill="#f8f9fb" rx="12"/>

  <!-- Title -->
  <text x="530" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">P&amp;AI Bot — AI Architecture Deep Dive</text>

  <!-- ════════════ INCOMING REQUEST ════════════ -->
  <rect x="310" y="52" width="440" height="42" rx="21" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="530" y="71" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Student Message → Agent Engine → AI Gateway</text>
  <text x="530" y="84" text-anchor="middle" font-size="7.5" fill="#64748b">CompletionRequest { Messages, Task, Model, MaxTokens, Temperature }</text>

  <line x1="530" y1="94" x2="530" y2="116" stroke="#3b82f6" stroke-width="1.6" marker-end="url(#a-blue)"/>

  <!-- ════════════ TASK-BASED ROUTER ════════════ -->
  <rect x="120" y="116" width="820" height="128" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.8"/>
  <text x="530" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#6b21a8">Task-Based Router</text>
  <text x="530" y="152" text-anchor="middle" font-size="8.5" fill="#64748b">internal/ai/router.go · Selects provider by task type + availability + circuit breaker state</text>

  <!-- Task type boxes -->
  <rect x="140" y="164" width="170" height="40" rx="6" fill="#faf5ff" stroke="#c084fc"/>
  <text x="225" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">TaskTeaching</text>
  <text x="225" y="195" text-anchor="middle" font-size="7.5" fill="#64748b">Best models (complex explanations)</text>

  <rect x="326" y="164" width="170" height="40" rx="6" fill="#faf5ff" stroke="#c084fc"/>
  <text x="411" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">TaskGrading</text>
  <text x="411" y="195" text-anchor="middle" font-size="7.5" fill="#64748b">Cheapest (fast JSON responses)</text>

  <rect x="512" y="164" width="170" height="40" rx="6" fill="#faf5ff" stroke="#c084fc"/>
  <text x="597" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">TaskNudge</text>
  <text x="597" y="195" text-anchor="middle" font-size="7.5" fill="#64748b">Any available model</text>

  <rect x="698" y="164" width="170" height="40" rx="6" fill="#faf5ff" stroke="#c084fc"/>
  <text x="783" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">TaskAnalysis</text>
  <text x="783" y="195" text-anchor="middle" font-size="7.5" fill="#64748b">Mastery assessment</text>

  <text x="530" y="226" text-anchor="middle" font-size="8" font-weight="500" fill="#7c3aed">Retry with backoff (1s → 2s → 4s) · Circuit breaker (3 consecutive failures → 30s cooldown) · Ordered fallback chain</text>

  <!-- Arrows to providers -->
  <line x1="225" y1="244" x2="120" y2="274" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#a-purple)"/>
  <line x1="340" y1="244" x2="300" y2="274" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#a-purple)"/>
  <line x1="470" y1="244" x2="480" y2="274" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#a-purple)"/>
  <line x1="600" y1="244" x2="660" y2="274" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#a-purple)"/>
  <line x1="730" y1="244" x2="810" y2="274" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#a-purple)"/>
  <line x1="850" y1="244" x2="940" y2="274" stroke="#a78bfa" stroke-width="1.3" marker-end="url(#a-purple)"/>

  <!-- ════════════ PROVIDER BOXES ════════════ -->
  <!-- OpenAI -->
  <rect x="40" y="274" width="155" height="90" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.4"/>
  <text x="117" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#6b21a8">OpenAI</text>
  <text x="117" y="306" text-anchor="middle" font-size="8" fill="#64748b">provider_openai.go</text>
  <text x="117" y="324" text-anchor="middle" font-size="8.5" fill="#7c3aed">GPT-4o (teaching)</text>
  <text x="117" y="337" text-anchor="middle" font-size="8.5" fill="#7c3aed">GPT-4o-mini (grading)</text>
  <text x="117" y="353" text-anchor="middle" font-size="7" fill="#94a3b8">Configurable base URL</text>

  <!-- Anthropic -->
  <rect x="210" y="274" width="155" height="90" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.4"/>
  <text x="287" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#6b21a8">Anthropic</text>
  <text x="287" y="306" text-anchor="middle" font-size="8" fill="#64748b">provider_anthropic.go</text>
  <text x="287" y="324" text-anchor="middle" font-size="8.5" fill="#7c3aed">Claude Sonnet (teaching)</text>
  <text x="287" y="337" text-anchor="middle" font-size="8.5" fill="#7c3aed">Claude Haiku (grading)</text>
  <text x="287" y="353" text-anchor="middle" font-size="7" fill="#94a3b8">Messages API format</text>

  <!-- DeepSeek -->
  <rect x="380" y="274" width="155" height="90" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.4"/>
  <text x="457" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#6b21a8">DeepSeek</text>
  <text x="457" y="306" text-anchor="middle" font-size="8" fill="#64748b">via provider_openai.go</text>
  <text x="457" y="324" text-anchor="middle" font-size="8.5" fill="#7c3aed">V3 (cheapest grading)</text>
  <text x="457" y="337" text-anchor="middle" font-size="8.5" fill="#7c3aed">Reasoner (analysis)</text>
  <text x="457" y="353" text-anchor="middle" font-size="7" fill="#94a3b8">OpenAI-compatible API</text>

  <!-- Gemini -->
  <rect x="550" y="274" width="155" height="90" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.4"/>
  <text x="627" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#6b21a8">Google Gemini</text>
  <text x="627" y="306" text-anchor="middle" font-size="8" fill="#64748b">provider_google.go</text>
  <text x="627" y="324" text-anchor="middle" font-size="8.5" fill="#7c3aed">2.5 Pro (teaching)</text>
  <text x="627" y="337" text-anchor="middle" font-size="8.5" fill="#7c3aed">2.5 Flash (grading)</text>
  <text x="627" y="353" text-anchor="middle" font-size="7" fill="#94a3b8">Unique API format</text>

  <!-- Ollama -->
  <rect x="720" y="274" width="140" height="90" rx="8" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.6"/>
  <text x="790" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Ollama</text>
  <text x="790" y="306" text-anchor="middle" font-size="8" fill="#64748b">provider_ollama.go</text>
  <text x="790" y="324" text-anchor="middle" font-size="8.5" fill="#166534">Llama 3, Qwen</text>
  <text x="790" y="337" text-anchor="middle" font-size="8.5" fill="#166534">Mistral, Gemma</text>
  <text x="790" y="353" text-anchor="middle" font-size="7.5" font-weight="600" fill="#16a34a">FREE · Self-hosted</text>

  <!-- OpenRouter -->
  <rect x="875" y="274" width="140" height="90" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.4"/>
  <text x="945" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#6b21a8">OpenRouter</text>
  <text x="945" y="306" text-anchor="middle" font-size="8" fill="#64748b">provider_openrouter.go</text>
  <text x="945" y="324" text-anchor="middle" font-size="8.5" fill="#7c3aed">100+ models</text>
  <text x="945" y="337" text-anchor="middle" font-size="8.5" fill="#7c3aed">Qwen, Kimi, etc.</text>
  <text x="945" y="353" text-anchor="middle" font-size="7" fill="#94a3b8">Single API key</text>

  <!-- ════════════ BUDGET TRACKER ════════════ -->
  <line x1="530" y1="364" x2="530" y2="392" stroke="#d97706" stroke-width="1.6" marker-end="url(#a-amber)"/>

  <rect x="250" y="392" width="560" height="58" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="1.4"/>
  <text x="530" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">Token Budget Tracker</text>
  <text x="530" y="427" text-anchor="middle" font-size="8.5" fill="#64748b">internal/ai/budget.go · BudgetChecker interface</text>
  <text x="530" y="442" text-anchor="middle" font-size="8" fill="#b45309">Check(tenant, user) → Record(tokens) → Usage()  ·  Dragonfly (real-time) + PostgreSQL (periodic sync)</text>

  <!-- Degradation -->
  <line x1="530" y1="450" x2="530" y2="472" stroke="#16a34a" stroke-width="1.4" marker-end="url(#a-green)"/>

  <rect x="200" y="472" width="660" height="34" rx="17" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.4"/>
  <text x="530" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Graceful Degradation: Premium Models → Cheap Models → Ollama (FREE)</text>
  <text x="530" y="501" text-anchor="middle" font-size="7.5" fill="#64748b">"No student is ever cut off from learning" — budget exhausted → auto-fallback to self-hosted</text>

  <!-- ════════════ PEDAGOGICAL PROMPT SYSTEM ════════════ -->
  <text x="530" y="540" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af" letter-spacing="0.5">PEDAGOGICAL PROMPT SYSTEM</text>

  <!-- Prompt Builder -->
  <rect x="40" y="556" width="470" height="174" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.6"/>
  <text x="275" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">System Prompt Builder</text>
  <text x="275" y="592" text-anchor="middle" font-size="8.5" fill="#64748b">Constructs system prompt from multiple signals</text>

  <rect x="56" y="604" width="210" height="50" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="161" y="620" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Dual-Loop Problem Solving</text>
  <text x="161" y="633" text-anchor="middle" font-size="7.5" fill="#64748b">Understand → Plan → Solve → Verify → Connect</text>
  <text x="161" y="645" text-anchor="middle" font-size="7" fill="#94a3b8">Inspired by DeepTutor dual-loop architecture</text>

  <rect x="282" y="604" width="210" height="50" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="387" y="620" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Adaptive Explanation Depth</text>
  <text x="387" y="633" text-anchor="middle" font-size="7.5" fill="#64748b">&lt;0.3 Beginner · 0.3-0.6 Developing · &gt;0.6 Proficient</text>
  <text x="387" y="645" text-anchor="middle" font-size="7" fill="#94a3b8">Mastery-based prompt selection</text>

  <rect x="56" y="664" width="210" height="50" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="161" y="680" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Curriculum Citation</text>
  <text x="161" y="693" text-anchor="middle" font-size="7.5" fill="#64748b">"KSSM Form 1 > Algebra > Linear Equations"</text>
  <text x="161" y="705" text-anchor="middle" font-size="7" fill="#94a3b8">{syllabus} > {subject} > {topic} injected</text>

  <rect x="282" y="664" width="210" height="50" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="387" y="680" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">Language &amp; Context</text>
  <text x="387" y="693" text-anchor="middle" font-size="7.5" fill="#64748b">EN / BM / 中文 · Student progress injected</text>
  <text x="387" y="705" text-anchor="middle" font-size="7" fill="#94a3b8">"Mastered X, working on Y, struggles with Z"</text>

  <!-- Quiz & Question Gen -->
  <rect x="540" y="556" width="470" height="174" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
  <text x="775" y="578" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Quiz &amp; Question Generation</text>
  <text x="775" y="592" text-anchor="middle" font-size="8.5" fill="#64748b">internal/agent/quiz.go</text>

  <rect x="556" y="604" width="210" height="50" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <text x="661" y="620" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">Static Questions</text>
  <text x="661" y="633" text-anchor="middle" font-size="7.5" fill="#64748b">assessments.yaml from OSS repo</text>
  <text x="661" y="645" text-anchor="middle" font-size="7" fill="#94a3b8">Pre-authored per topic</text>

  <rect x="782" y="604" width="210" height="50" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <text x="887" y="620" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">Dynamic Generation</text>
  <text x="887" y="633" text-anchor="middle" font-size="7.5" fill="#64748b">AI generates when &lt;5 questions exist</text>
  <text x="887" y="645" text-anchor="middle" font-size="7" fill="#94a3b8">CompleteJSON via cheapest model</text>

  <rect x="556" y="664" width="210" height="50" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <text x="661" y="680" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">Exam-Style Mimicry</text>
  <text x="661" y="693" text-anchor="middle" font-size="7.5" fill="#64748b">PT3/SPM exemplars as style references</text>
  <text x="661" y="705" text-anchor="middle" font-size="7" fill="#94a3b8">Matches real exam format &amp; difficulty</text>

  <rect x="782" y="664" width="210" height="50" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <text x="887" y="680" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">AI Grading</text>
  <text x="887" y="693" text-anchor="middle" font-size="7.5" fill="#64748b">Free-text answer evaluation</text>
  <text x="887" y="705" text-anchor="middle" font-size="7" fill="#94a3b8">Hints &amp; feedback on wrong answers</text>

  <!-- ════════════ PROVIDER INTERFACE ════════════ -->
  <rect x="120" y="760" width="820" height="80" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="530" y="782" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Go Interface: Provider</text>
  <text x="530" y="800" text-anchor="middle" font-size="9.5" font-weight="500" fill="#7c3aed" font-family="'Fira Code', Consolas, monospace">Complete(ctx, CompletionRequest) → (CompletionResponse, error)</text>
  <text x="530" y="816" text-anchor="middle" font-size="9.5" font-weight="500" fill="#7c3aed" font-family="'Fira Code', Consolas, monospace">StreamComplete(ctx, CompletionRequest) → (chan StreamChunk, error)</text>
  <text x="530" y="832" text-anchor="middle" font-size="9.5" font-weight="500" fill="#7c3aed" font-family="'Fira Code', Consolas, monospace">Models() → []ModelInfo  ·  HealthCheck(ctx) → error</text>

  <!-- ════════════ ARROW MARKERS ════════════ -->
  <defs>
    <marker id="a-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#3b82f6"/>
    </marker>
    <marker id="a-purple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#7c3aed"/>
    </marker>
    <marker id="a-amber" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#d97706"/>
    </marker>
    <marker id="a-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
