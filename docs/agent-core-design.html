:root[data-theme=&quot;light&quot;] {
  color-scheme: light;
}

:root[data-theme=&quot;dark&quot;] {
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

html &gt; body {
  margin: 0;
  padding: 5px;
  color: var(--foreground);
  background: transparent !important;
  font-family: var(--font-sans);
  font-size: var(--font-size-normal);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

a {
  color: color-mix(in srgb, var(--viz-accent) 80%, var(--viz-text) 20%);
  cursor: pointer;
  font-weight: var(--viz-font-weight-medium);
  text-decoration: none;
  text-underline-offset: 2px;
}

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;
}

h1,
h2,
h3,
h4,
h5,
h6,
p {
  margin-block: 0;
}

h1 {
  font-size: var(--font-size-h1);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h2 {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h3,
h4,
h5,
h6 {
  font-size: var(--font-size-h3);
  font-weight: var(--font-weight-medium);
  line-height: 1.3;
}

b,
strong,
th {
  font-weight: var(--font-weight-medium);
}

code:not(pre code) {
  display: inline;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.92em;
  overflow-wrap: anywhere;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  word-break: break-word;
}

#widget {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 0;
  background: transparent !important;
}

.card {
  min-width: 0;
  padding: 12px;
  overflow: hidden;
  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);
}

#widget &gt; :not(.card) {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {
  position: fixed;
  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(
    20rem,
    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));
  gap: 10px;
}

.viz-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  color: var(--accent-foreground);
  background: var(--accent);
  font-weight: var(--font-weight-medium);
}

small,
.text-small,
.viz-badge {
  font-size: var(--font-size-small);
  line-height: var(--line-height-small);
}

.text-muted {
  color: var(--muted-foreground);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.viz-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.viz-controls &gt; .form-label {
  display: grid;
  min-width: min(100%, 260px);
  flex: 1 1 280px;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 2px 12px;
  margin-bottom: 0;
}

.viz-controls &gt; .form-label &gt; :is(.form-control, .form-range, .form-select) {
  grid-column: 1 / -1;
}

.btn,
.form-check-input,
.form-control,
.form-range,
.form-select {
  font: inherit;
}

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.btn:is(.btn-block, .viz-tile) {
  inline-size: 100%;
}

.btn.viz-tile {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {
  cursor: pointer;
  text-decoration: none;
}

.btn:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn-primary {
  border-color: transparent;
  color: var(--primary-foreground);
  background: var(--foreground);
  background-clip: padding-box;
}

.btn-primary .text-muted {
  color: color-mix(in srgb, var(--primary-foreground) 50%, transparent);
}

.btn-primary:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 80%, transparent);
  background-clip: padding-box;
}

.btn-ghost {
  border-color: transparent;
  color: var(--muted-foreground);
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {
  stroke-width: 1.6;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {
  display: block;
  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background: var(--secondary);
}

.form-control::placeholder {
  color: var(--muted-foreground);
}

.form-control[type=&quot;file&quot;] {
  padding: 0;
  overflow: hidden;
  cursor: var(--cursor-interaction, pointer);
}

.form-control[type=&quot;file&quot;]::file-selector-button {
  min-height: 26px;
  margin-right: 8px;
  padding: 0 8px;
  border: 0;
  border-right: 1px solid var(--input);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: inherit;
  font: inherit;
}

.form-control[type=&quot;file&quot;]:not(:disabled):hover::file-selector-button {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-control-color[type=&quot;color&quot;] {
  width: 40px;
  height: 28px;
  padding: 3px;
  cursor: var(--cursor-interaction, pointer);
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch-wrapper {
  padding: 0;
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch {
  border: 0;
  border-radius: calc(var(--radius-lg) - 4px);
  corner-shape: superellipse(1.5);
}

textarea.form-control {
  height: auto;
  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,
.form-select:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.form-select {
  appearance: none;
  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background-color: var(--secondary);
  background-image:
    linear-gradient(45deg, transparent 50%, var(--muted-foreground) 50%),
    linear-gradient(135deg, var(--muted-foreground) 50%, transparent 50%);
  background-position:
    calc(100% - 14px) 50%,
    calc(100% - 10px) 50%;
  background-repeat: no-repeat;
  background-size: 4px 4px;
  cursor: var(--cursor-interaction, default);
}

.form-select:not(:disabled):hover {
  background-color: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-select:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-check {
  display: flex;
  min-height: 20px;
  align-items: center;
  gap: 6px;
}

.form-check-input {
  appearance: none;
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:
    background-color 150ms,
    border-color 150ms,
    box-shadow 150ms;
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);
}

.form-check:not(.form-switch)
  .form-check-input:not(:disabled):not(:checked):hover {
  background-color: var(--card);
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;]:checked {
  border-color: var(--primary);
  background-color: var(--primary);
}

.form-check:not(.form-switch)
  .form-check-input[type=&quot;checkbox&quot;]:checked::before {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--primary-foreground);
  content: &quot;&quot;;
  mask: var(--checkmark-image) center / 12px 12px no-repeat;
}

.form-check-input[type=&quot;radio&quot;] {
  width: 14px;
  height: 14px;
  border-radius: var(--radius-full);
}

.form-check-input[type=&quot;radio&quot;]:checked {
  border: 2px solid var(--primary);
  background:
    radial-gradient(circle, var(--primary-foreground) 0 2.5px, transparent 3px),
    var(--primary);
}

.form-check:not(.form-switch) .form-check-input:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;
  pointer-events: none;
}

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
}

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;
}

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input::before {
  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);

  &lt;div class=&quot;toolbar&quot;&gt;

      &lt;/div&gt;

  &lt;p class=&quot;footnote&quot;&gt;Proposed flow. Tool messages are transient execution data; v1 persists only the learner message and final tutor answer.&lt;/p&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;pai-agent-core-side-by-side&#x27;);
      if (!root) return;

      const request = &#x27;Help me understand 2x + 4 = 10. Use the Form 1 curriculum.&#x27;;
      const answer = &#x27;Think of the equation as a balanced scale. Subtract 4 from both sides: 2x = 6. Then divide both sides by 2: x = 3. What must stay true each time we change one side?&#x27;;

      const base = [
        [&#x27;system&#x27;, &#x27;Concise Form 1 maths tutor; curriculum tool available&#x27;],
        [&#x27;user&#x27;, request]
      ];
      const call = [&#x27;assistant&#x27;, &#x27;lookup_curriculum({ topic: &quot;linear_equations&quot; })&#x27;];
      const result = [&#x27;tool&#x27;, &#x27;call_01 → Apply inverse operations equally to both sides&#x27;];
      const final = [&#x27;assistant&#x27;, answer];

      const steps = [
        {
          name: &#x27;Learner sends a message&#x27;, owner: &#x27;internal/agent&#x27;, title: &#x27;Start one teaching turn&#x27;,
          copy: &#x27;Store the learner text, load conversation history, and build the tutor context.&#x27;,
          code: &#x27;store.AddMessage(role: &quot;user&quot;)\ncontext := buildTutorContext(turn)&#x27;,
          messages: base, tutorState: &#x27;preparing&#x27;, telegramState: &#x27;received&#x27;
        },
        {
          name: &#x27;Core calls the model&#x27;, owner: &#x27;internal/agentcore&#x27;, title: &#x27;Run the transcript&#x27;,
          copy: &#x27;The core receives native messages and tool definitions. It does not know this is Telegram.&#x27;,
          code: &#x27;reply := model.Complete(ctx, context)\ntranscript.Append(reply)&#x27;,
          messages: base, tutorState: &#x27;thinking&#x27;, telegramState: &#x27;typing&#x27;
        },
        {
          name: &#x27;Model requests curriculum&#x27;, owner: &#x27;internal/llm&#x27;, title: &#x27;Return a native tool call&#x27;,
          copy: &#x27;The provider returns structured data. No tool-call text parsing and no learner-move classifier.&#x27;,
          code: &#x27;ToolCall{\n  ID: &quot;call_01&quot;,\n  Name: &quot;lookup_curriculum&quot;,\n}&#x27;,
          messages: [...base, call], tutorState: &#x27;curriculum&#x27;, telegramState: &#x27;typing&#x27;
        },
        {
          name: &#x27;Core executes the tool&#x27;, owner: &#x27;internal/agentcore&#x27;, title: &#x27;Validate, run, append&#x27;,
          copy: &#x27;The registered tool runs sequentially. Its result is paired to call_01 and appended in memory.&#x27;,
          code: &#x27;result := tools.Execute(ctx, call)\ntranscript.Append(result)&#x27;,
          messages: [...base, call, result], tutorState: &#x27;curriculum&#x27;, telegramState: &#x27;typing&#x27;
        },
        {
          name: &#x27;Core calls the model again&#x27;, owner: &#x27;internal/agentcore&#x27;, title: &#x27;Continue the same loop&#x27;,
          copy: &#x27;Because the previous assistant message had a tool call, the core sends the updated transcript back.&#x27;,
          code: &#x27;if len(reply.ToolCalls()) &gt; 0 {\n  continue\n}&#x27;,
          messages: [...base, call, result], tutorState: &#x27;writing&#x27;, telegramState: &#x27;typing&#x27;
        },
        {
          name: &#x27;Model returns the tutor answer&#x27;, owner: &#x27;internal/llm&#x27;, title: &#x27;Stop on no tool calls&#x27;,
          copy: &#x27;The assistant returns normal text. With zero tool calls, the core releases the completed turn.&#x27;,
          code: &#x27;if len(reply.ToolCalls()) == 0 {\n  return reply\n}&#x27;,
          messages: [...base, call, result, final], tutorState: &#x27;answered&#x27;, telegramState: &#x27;typing&#x27;
        },
        {
          name: &#x27;Tutor persists; Telegram delivers&#x27;, owner: &#x27;internal/agent + internal/chat&#x27;, title: &#x27;Finish outside the core&#x27;,
          copy: &#x27;The tutor cleans and stores the final text. Telegram normalizes Markdown, sends it, and owns delivery state.&#x27;,
          code: &#x27;store.AddMessage(role: &quot;assistant&quot;)\ntelegram.SendMessage(finalText)&#x27;,
          messages: [...base, call, result, final], tutorState: &#x27;answered&#x27;, telegramState: &#x27;delivered&#x27;
        }
      ];

      const refs = {
        stepName: root.querySelector(&#x27;#step-name&#x27;),
        stepCounter: root.querySelector(&#x27;#step-counter&#x27;),
        tutor: root.querySelector(&#x27;#tutor-chat&#x27;),
        telegram: root.querySelector(&#x27;#telegram-chat&#x27;),
        owner: root.querySelector(&#x27;#owner&#x27;),
        title: root.querySelector(&#x27;#operation-title&#x27;),
        copy: root.querySelector(&#x27;#operation-copy&#x27;),
        code: root.querySelector(&#x27;#code&#x27;),
        transcript: root.querySelector(&#x27;#transcript&#x27;),
        next: root.querySelector(&#x27;#next&#x27;),
        restart: root.querySelector(&#x27;#restart&#x27;)
      };

      let index = 0;

      function bubble(role, text, extraClass = &#x27;&#x27;) {
        const node = document.createElement(&#x27;div&#x27;);
        node.className = `bubble ${role} ${extraClass}`.trim();
        const label = document.createElement(&#x27;span&#x27;);
        label.className = &#x27;role&#x27;;
        label.textContent = role === &#x27;learner&#x27; ? &#x27;Learner&#x27; : &#x27;Tutor&#x27;;
        const content = document.createElement(&#x27;p&#x27;);
        content.textContent = text;
        node.append(label, content);
        return node;
      }

      function thinking(text) {
        const node = document.createElement(&#x27;p&#x27;);
        node.className = &#x27;thinking&#x27;;
        node.textContent = text;
        return node;
      }

      function renderTutor(state) {
        const nodes = [bubble(&#x27;learner&#x27;, request)];
        const status = {
          preparing: &#x27;Preparing the turn&#x27;,
          thinking: &#x27;Thinking&#x27;,
          curriculum: &#x27;Checking the Form 1 curriculum&#x27;,
          writing: &#x27;Writing the explanation&#x27;
        };
        if (state === &#x27;answered&#x27;) nodes.push(bubble(&#x27;tutor&#x27;, answer));
        else nodes.push(thinking(status[state]));
        refs.tutor.replaceChildren(...nodes);
      }

      function renderTelegram(state) {
        const bar = document.createElement(&#x27;div&#x27;);
        bar.className = &#x27;phone-bar&#x27;;
        const bot = document.createElement(&#x27;span&#x27;);
        bot.textContent = &#x27;P&amp;AI Tutor&#x27;;
        const presence = document.createElement(&#x27;span&#x27;);
        presence.textContent = state === &#x27;typing&#x27; ? &#x27;typing…&#x27; : &#x27;bot&#x27;;
        bar.append(bot, presence);

        const nodes = [bar, bubble(&#x27;learner&#x27;, request)];
        if (state === &#x27;typing&#x27;) nodes.push(thinking(&#x27;Telegram typing indicator&#x27;));
        if (state === &#x27;received&#x27;) nodes.push(thinking(&#x27;Update received&#x27;));
        if (state === &#x27;delivered&#x27;) {
          nodes.push(bubble(&#x27;tutor&#x27;, answer));
          const delivered = document.createElement(&#x27;p&#x27;);
          delivered.className = &#x27;delivery&#x27;;
          delivered.textContent = &#x27;Delivered ✓✓&#x27;;
          nodes.push(delivered);
        }
        refs.telegram.replaceChildren(...nodes);
      }

      function renderTranscript(messages) {
        const label = document.createElement(&#x27;span&#x27;);
        label.className = &#x27;data-label&#x27;;
        label.textContent = `Model transcript · ${messages.length} messages`;

        const rows = messages.map(([roleName, value]) =&gt; {
          const row = document.createElement(&#x27;div&#x27;);
          row.className = &#x27;message-row&#x27;;
          const role = document.createElement(&#x27;span&#x27;);
          role.className = &#x27;role&#x27;;
          role.textContent = roleName;
          const content = document.createElement(&#x27;code&#x27;);
          content.textContent = value;
          row.append(role, content);
          return row;
        });
        refs.transcript.replaceChildren(label, ...rows);
      }

      function render() {
        const step = steps[index];
        refs.stepName.textContent = step.name;
        refs.stepCounter.textContent = `${index + 1} / ${steps.length}`;
        refs.owner.textContent = step.owner;
        refs.title.textContent = step.title;
        refs.copy.textContent = step.copy;
        refs.code.textContent = step.code;
        renderTutor(step.tutorState);
        renderTelegram(step.telegramState);
        renderTranscript(step.messages);
        refs.restart.disabled = index === 0;
        refs.next.disabled = index === steps.length - 1;
        refs.next.textContent = index === steps.length - 1 ? &#x27;Run complete&#x27; : &#x27;Next event&#x27;;
      }

      refs.next.addEventListener(&#x27;click&#x27;, () =&gt; {
        if (index &lt; steps.length - 1) {
          index += 1;
          render();
        }
      });

      refs.restart.addEventListener(&#x27;click&#x27;, () =&gt; {
        index = 0;
        render();
        refs.next.focus();
      });

      render();
    })();
  &lt;/script&gt;
&lt;/section&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
