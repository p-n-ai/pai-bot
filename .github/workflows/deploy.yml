name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Validate admin lockfile
        working-directory: admin
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -short -count=1

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build Go Docker image
        run: docker build -f deploy/docker/Dockerfile -t pai-bot:latest .

      - name: Build Admin Docker image
        run: docker build -f deploy/docker/Dockerfile.admin --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} -t pai-admin:latest .

      - name: Save Docker images
        run: |
          docker save pai-bot:latest | gzip > pai-bot.tar.gz
          docker save pai-admin:latest | gzip > pai-admin.tar.gz

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "pai-bot.tar.gz,pai-admin.tar.gz,docker-compose.yml,docker-compose.prod.yml,deploy/caddy,migrations"
          target: ${{ secrets.DEPLOY_DIR }}
          strip_components: 0

      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: DEPLOY_DIR,LEARN_TELEGRAM_BOT_TOKEN,PAI_AUTH_SECRET,PAI_AUTH_GOOGLE_CLIENT_ID,PAI_AUTH_GOOGLE_CLIENT_SECRET,PAI_AUTH_GOOGLE_ALLOWED_DOMAIN,LEARN_AI_OPENAI_API_KEY,LEARN_AI_ANTHROPIC_API_KEY,LEARN_AI_DEEPSEEK_API_KEY,LEARN_AI_GOOGLE_API_KEY,LEARN_AI_OPENROUTER_API_KEY,POSTGRES_PASSWORD,DOMAIN
          script: |
            set -euo pipefail
            cd $DEPLOY_DIR

            echo "--- Writing .env ---"
            cat > .env << ENVEOF
            LEARN_SERVER_PORT=8080
            LEARN_DATABASE_URL=postgres://pai:${POSTGRES_PASSWORD}@postgres:5432/pai?sslmode=disable
            LEARN_DATABASE_MAX_CONNS=25
            LEARN_CACHE_URL=redis://dragonfly:6379
            LEARN_NATS_URL=nats://nats:4222
            LEARN_TELEGRAM_BOT_TOKEN=${LEARN_TELEGRAM_BOT_TOKEN}
            PAI_AUTH_SECRET=${PAI_AUTH_SECRET}
            PAI_AUTH_GOOGLE_CLIENT_ID=${PAI_AUTH_GOOGLE_CLIENT_ID}
            PAI_AUTH_GOOGLE_CLIENT_SECRET=${PAI_AUTH_GOOGLE_CLIENT_SECRET}
            PAI_AUTH_GOOGLE_ALLOWED_DOMAIN=${PAI_AUTH_GOOGLE_ALLOWED_DOMAIN}
            LEARN_AI_OPENAI_API_KEY=${LEARN_AI_OPENAI_API_KEY}
            LEARN_AI_ANTHROPIC_API_KEY=${LEARN_AI_ANTHROPIC_API_KEY}
            LEARN_AI_DEEPSEEK_API_KEY=${LEARN_AI_DEEPSEEK_API_KEY}
            LEARN_AI_GOOGLE_API_KEY=${LEARN_AI_GOOGLE_API_KEY}
            LEARN_AI_OPENROUTER_API_KEY=${LEARN_AI_OPENROUTER_API_KEY}
            LEARN_AI_OLLAMA_ENABLED=false
            LEARN_TENANT_MODE=single
            LEARN_CURRICULUM_PATH=./oss
            LEARN_DISABLE_MULTI_LANGUAGE=false
            LEARN_RATING_PROMPT_EVERY_REPLIES=5
            LEARN_LOG_LEVEL=info
            LEARN_LOG_FORMAT=json
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            ENVEOF

            echo "--- Configuring Caddy ---"
            if [ -n "${DOMAIN}" ] && [ "${DOMAIN}" != "localhost" ]; then
              echo "DOMAIN=${DOMAIN}" >> .env
              cp deploy/caddy/Caddyfile.https deploy/caddy/Caddyfile
            else
              cp deploy/caddy/Caddyfile.http deploy/caddy/Caddyfile
            fi

            echo "--- Loading Docker images ---"
            docker load < pai-bot.tar.gz
            docker load < pai-admin.tar.gz
            rm pai-bot.tar.gz pai-admin.tar.gz

            echo "--- Ensuring infra services are up ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d postgres dragonfly nats
            sleep 3

            echo "--- Running migrations (goose) ---"
            if docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile tools run --rm goose \
              go run github.com/pressly/goose/v3/cmd/goose@v3.26.0 \
              -dir /app/migrations postgres \
              "postgres://pai:${POSTGRES_PASSWORD}@postgres:5432/pai?sslmode=disable" \
              up -allow-missing; then
              echo "Migrations applied successfully"
            else
              echo "WARNING: Migration failed (exit $?) - app will still start with existing schema"
            fi

            echo "--- Rolling out new containers ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            echo "--- Waiting for app container health ---"
            APP_CONTAINER=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q app)
            if [ -z "$APP_CONTAINER" ]; then
              echo "ERROR: app container was not created"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
              exit 1
            fi

            APP_HEALTH=""
            for i in $(seq 1 30); do
              APP_HEALTH=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$APP_CONTAINER")
              if [ "$APP_HEALTH" = "healthy" ]; then
                echo "App container is healthy"
                break
              fi
              echo "Attempt $i/30: app health=$APP_HEALTH"
              sleep 2
            done

            if [ "$APP_HEALTH" != "healthy" ]; then
              echo "ERROR: app container did not become healthy"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 app
              exit 1
            fi

            echo "--- Verifying app endpoint directly ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T app curl -sf --max-time 5 http://localhost:8080/healthz > /dev/null

            echo "--- Verifying Caddy route ---"
            if curl -sf --max-time 10 http://localhost/healthz; then
              echo "Deploy successful"
            else
              echo "ERROR: Caddy health check failed"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 caddy
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=100 app
              exit 1
            fi

            echo "--- Cleaning up old images ---"
            docker image prune -f

            echo "--- Container status ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
        env:
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          LEARN_TELEGRAM_BOT_TOKEN: ${{ secrets.LEARN_TELEGRAM_BOT_TOKEN }}
          PAI_AUTH_SECRET: ${{ secrets.PAI_AUTH_SECRET }}
          PAI_AUTH_GOOGLE_CLIENT_ID: ${{ secrets.PAI_AUTH_GOOGLE_CLIENT_ID }}
          PAI_AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.PAI_AUTH_GOOGLE_CLIENT_SECRET }}
          PAI_AUTH_GOOGLE_ALLOWED_DOMAIN: ${{ secrets.PAI_AUTH_GOOGLE_ALLOWED_DOMAIN }}
          LEARN_AI_OPENAI_API_KEY: ${{ secrets.LEARN_AI_OPENAI_API_KEY }}
          LEARN_AI_ANTHROPIC_API_KEY: ${{ secrets.LEARN_AI_ANTHROPIC_API_KEY }}
          LEARN_AI_DEEPSEEK_API_KEY: ${{ secrets.LEARN_AI_DEEPSEEK_API_KEY }}
          LEARN_AI_GOOGLE_API_KEY: ${{ secrets.LEARN_AI_GOOGLE_API_KEY }}
          LEARN_AI_OPENROUTER_API_KEY: ${{ secrets.LEARN_AI_OPENROUTER_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DOMAIN: ${{ secrets.DOMAIN }}
