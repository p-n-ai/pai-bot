name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install pnpm
        working-directory: admin
        run: |
          corepack enable
          corepack prepare pnpm@10.26.2 --activate

      - name: Validate admin lockfile
        working-directory: admin
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Admin lint
        working-directory: admin
        run: pnpm lint

      - name: Admin test
        working-directory: admin
        run: pnpm test

      - name: Download Go dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -short -count=1

  push-images:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push app image
        run: |
          docker build -f deploy/docker/Dockerfile \
            -t ${{ secrets.ECR_REGISTRY }}/pai-bot/app:${{ github.sha }} \
            -t ${{ secrets.ECR_REGISTRY }}/pai-bot/app:latest .
          docker push ${{ secrets.ECR_REGISTRY }}/pai-bot/app:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/pai-bot/app:latest

      - name: Build and push admin image
        run: |
          docker build -f deploy/docker/Dockerfile.admin \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ secrets.ECR_REGISTRY }}/pai-bot/admin:${{ github.sha }} \
            -t ${{ secrets.ECR_REGISTRY }}/pai-bot/admin:latest .
          docker push ${{ secrets.ECR_REGISTRY }}/pai-bot/admin:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/pai-bot/admin:latest

  deploy:
    runs-on: ubuntu-latest
    needs: push-images
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,deploy/caddy,migrations,scripts/deploy-remote.sh"
          target: ${{ secrets.DEPLOY_DIR }}
          strip_components: 0

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: REGISTRY,TAG,REGION
          script: |
            chmod +x /opt/pai-bot/scripts/deploy-remote.sh
            REGISTRY=$REGISTRY TAG=$TAG REGION=$REGION /opt/pai-bot/scripts/deploy-remote.sh
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          TAG: ${{ github.sha }}
          REGION: ${{ secrets.AWS_REGION }}
